name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  cross-gems:
    needs: test
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arm64-darwin
          - x86_64-linux
          - aarch64-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - uses: oxidize-rb/actions/cross-gem@v1
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          ruby-versions: "3.3,3.4,4.0"

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/*-${{ matrix.platform }}.gem
          if-no-files-found: error

  release:
    needs: [test, cross-gems]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: "4.0"

      - name: Configure OIDC credentials
        uses: rubygems/configure-rubygems-credentials@v2.1.0

      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          merge-multiple: true
          path: pkg/

      - name: Build source gem
        run: gem build liteparse-rb.gemspec && mv liteparse-rb-*.gem pkg/

      - name: Ensure version matches tag
        run: |
          VERSION=$(grep VERSION lib/liteparse/version.rb | head -1 | cut -d'"' -f2)
          if [ "v$VERSION" != "${{ github.ref_name }}" ]; then
            echo "Version mismatch: v$VERSION != ${{ github.ref_name }}"
            exit 1
          fi

      - name: Push all gems
        working-directory: pkg/
        run: |
          for gem in *.gem; do
            [ -f "$gem" ] || continue
            echo "Pushing $gem..."
            gem push "$gem"
          done