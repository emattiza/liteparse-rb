name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: arm64-darwin
          - os: ubuntu-latest
            platform: x86_64-linux
          - os: ubuntu-24.04-arm
            platform: aarch64-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install cmake (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cmake

      - name: Install cmake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - uses: dtolnay/rust-toolchain@stable

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: "4.0"

      - name: Compile native extension
        run: bundle exec rake compile

      - name: Bundle pdfium next to native extension
        run: |
          case "${{ matrix.platform }}" in
            arm64-darwin)
              ASSET="pdfium-mac-arm64"
              DYLIB="libpdfium.dylib"
              ;;
            x86_64-linux)
              ASSET="pdfium-linux-x64"
              DYLIB="libpdfium.so"
              ;;
            aarch64-linux)
              ASSET="pdfium-linux-arm64"
              DYLIB="libpdfium.so"
              ;;
          esac
          TAG="chromium/7897"
          URL_TAG="${TAG//\//%2F}"
          URL="https://github.com/run-llama/pdfium-binaries/releases/download/${URL_TAG}/${ASSET}.tgz"
          TMP=$(mktemp -d)
          curl -fsSL "$URL" -o "$TMP/${ASSET}.tgz"
          tar -xzf "$TMP/${ASSET}.tgz" -C "$TMP"
          SRC="$TMP/lib/$DYLIB"
          if [ "$DYLIB" = "libpdfium.dylib" ] && command -v install_name_tool >/dev/null 2>&1; then
            install_name_tool -id "@rpath/libpdfium.dylib" "$SRC"
          fi
          cp "$SRC" "lib/liteparse/$DYLIB"
          echo "Copied pdfium -> lib/liteparse/$DYLIB"

      - name: Build platform gem
        run: |
          VERSION=$(grep VERSION lib/liteparse/version.rb | head -1 | cut -d'"' -f2)
          ruby -r rubygems/package -e "
            spec = Gem::Specification.load('liteparse-rb.gemspec')
            spec.platform = '${{ matrix.platform }}'
            spec.extensions = []
            Gem::Package.build(spec)
          "
          mkdir -p pkg
          mv liteparse-rb-*.gem "pkg/liteparse-rb-${VERSION}-${{ matrix.platform }}.gem"

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/liteparse-rb-*.gem
          if-no-files-found: error

  release:
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: "4.0"

      - uses: rubygems/configure-rubygems-credentials@v2.1.0

      - uses: actions/download-artifact@v4
        with:
          pattern: gem-*
          merge-multiple: true
          path: pkg/

      - name: Build source gem
        run: |
          gem build liteparse-rb.gemspec
          mv liteparse-rb-*.gem pkg/

      - name: Ensure version matches tag
        run: |
          VERSION=$(grep VERSION lib/liteparse/version.rb | head -1 | cut -d'"' -f2)
          if [ "v$VERSION" != "${{ github.ref_name }}" ]; then
            echo "Version mismatch: v$VERSION != ${{ github.ref_name }}"
            exit 1
          fi

      - name: Push all gems
        working-directory: pkg/
        run: |
          for gem in *.gem; do
            [ -f "$gem" ] || continue
            echo "Pushing $gem..."
            gem push "$gem"
          done