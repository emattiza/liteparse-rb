name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: arm64-darwin
          - os: ubuntu-latest
            platform: x86_64-linux
          - os: ubuntu-24.04-arm
            platform: aarch64-linux

    runs-on: ${{ matrix.os }}

    permissions:
      id-token: write

    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: "4.0"

      - name: Build native extension
        run: bundle exec rake compile

      - name: Build and push platform gem
        uses: rubygems/release-gem@v1
        with:
          platform: ${{ matrix.platform }}

  push-source:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    environment: release

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: "4.0"

      - name: Build and push source gem
        uses: rubygems/release-gem@v1